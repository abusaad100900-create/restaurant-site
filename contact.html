<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="AL-HUSSEINY" />
    <meta
      name="description"
      content=" Contact information For The Little Taco Shop"
    />
    <title>Contact Us - LTS</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <script src="js/main.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__h1">Little Taco Shop</h1>
      <nav class="header__nav">
        <ul class="header__ul">
          <li>
            <a href="index.html">Menu</a>
          </li>
          
          <li>
            <a href="hours.html">Hours</a>
          </li>
          <li>
            <a href="contact.html">Contact</a>
          </li>
          <li>
            <a href="about.html">About</a>
          </li>
        </ul>
      </nav>
    </header>

    <article class="hero">
      <figure>
        <img
          src="pics20.png"
          alt="Little Taco Shop tacos"
          title="Tacos ready to eat!"
          width="1000"
          height="649"
        />
        <figcaption class="offscreen">LittleTaco Shop Tacos</figcaption>
      </figure>
    </article>

    <main class="main">
      <article class="main__article">
        <h2 class="conatct__h2">Our Location</h2>
        <address>
          111 Taco Temptation Lane, Suite T<br />
          Kansas City, No 11111-1111
          <br /><br />
          phone: <a href="tel:+2347049180318">234-704-9180-318</a>
        </address>
      </article>
      <hr />
      <article class="main__article contact">
        <h2>Our Contact Form</h2>

        <form
          action="https://httpbin.org/get"
          method="get"
          class="contact__form"
        >
          <fieldset class="contact__fieldset">
            <legend class="offscreen">Send Us a Message</legend>
            <p class="contact__p">
              <label for="name">Name:</label>
              <input
                class="contact__input"
                type="text"
                name="name"
                id="name"
                placeholder="Your name"
                required
              />
            </p>
            <p class="contact__p">
              <label class="contact__label" for="email">Email:</label>
              <input
                class="contact__input"
                type="email"
                name="email"
                id="email"
                placeholder="Your email"
                required
              />
            </p>
            <p class="contact__p">
              <label class="contact__label" for="message">your message:</label>
              <br />
              <textarea
                class="contact__textarea"
                name="message"
                id="message"
                cols="30"
                rows="10"
                placeholder="Type your message here"
              ></textarea>
            </p>
          </fieldset>
          <button class="contact__button" type="submit">send</button>
          <button class="contact__button" type="reset">Reset</button>
        </form>
      </article>
    </main>
    <hr />
    <footer class="footer">
      <p>
        <span class="nowrap">copyright &copy; <time id="year">2022</time></span>
        <span class="nowrap">Little Taco Shop </span>
      </p>
    </footer>
  </body>
</html>
